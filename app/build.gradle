import java.time.ZoneId
import java.time.ZonedDateTime
import java.time.format.DateTimeFormatter

plugins {
    id 'com.android.application'
    alias(libs.plugins.kotlin.compose)
}

static def getGitCommitHash() {
    try {
        return 'git rev-parse --short HEAD'.execute().text.trim()
    } catch (Exception ignored) {
        return "Dev"
    }
}

static def getGitCommitCount() {
    try {
        return 'git rev-list --count HEAD'.execute().text.trim().toInteger()
    } catch (Exception ignored) {
        return 1
    }
}

static def getBuildMetadata(project, propertyName, envName, fallbackValue) {
    def value = project.findProperty(propertyName)
    if (value == null || value.toString().trim().isEmpty()) {
        value = System.getenv(envName)
    }
    value = value?.toString()?.trim()
    return value ? value : fallbackValue
}

static def getDefaultVersionPrefix() {
    def now = ZonedDateTime.now(ZoneId.of("Asia/Shanghai"))
    return now.format(DateTimeFormatter.ofPattern("'Version.'yy.M"))
}

static def escapeForBuildConfig(String value) {
    return value.replace("\\", "\\\\").replace("\"", "\\\"")
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

android {
    namespace = 'com.example.islandlyrics'
    compileSdk = 37

    // Check if custom keystore is available
    def keystorePath = localProperties.getProperty('store.file')
    def hasCustomKeystore = keystorePath != null && file(keystorePath).exists()

    signingConfigs {
        if (hasCustomKeystore) {
            release {
                storeFile file(keystorePath)
                storePassword localProperties.getProperty('store.password')
                keyAlias localProperties.getProperty('key.alias')
                keyPassword localProperties.getProperty('key.password')
                enableV1Signing = true
                enableV2Signing = true
                enableV3Signing = true
            }
        }
    }

    defaultConfig {
        versionCode = getGitCommitCount()
        applicationId = "com.franco.capsulyric"
        minSdk = 35
        targetSdk = 36

        def versionPrefix = getBuildMetadata(project, "versionPrefix", "APP_VERSION_PREFIX", getDefaultVersionPrefix())
        def baseVersion = getBuildMetadata(project, "versionName", "APP_VERSION_NAME", "${versionPrefix}.Canary")
        def appCodename = getBuildMetadata(project, "appCodename", "APP_CODENAME", "Unassigned")
        versionName = "${baseVersion}_C${getGitCommitCount()}"

        buildConfigField "String", "GIT_COMMIT_HASH", "\"${getGitCommitHash()}\""
        buildConfigField "String", "VERSION_CODENAME", "\"${escapeForBuildConfig(appCodename)}\""
        buildConfigField "boolean", "LIVE_UPDATE_ENABLED", "true"

        // Strip unused localized resources to reduce APK size
        resConfigs "zh", "en"
    }


    buildTypes {
        debug {
            applicationIdSuffix = ".debug"
            resValue "string", "app_name", "Capsulyric Debug"
            
            // Enable shrinking for debug to reduce size (e.g. from material-icons-extended)
            // Uses a specific config to disable obfuscation for easier debugging
            minifyEnabled = false
            shrinkResources = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-debug.pro'

        }
        release {
            // Use custom keystore if available, otherwise use debug signing
            signingConfig = hasCustomKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        prerelease {
            initWith release
            matchingFallbacks = ['release']
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    buildFeatures {
        buildConfig = true
        compose = true
        resValues = true
        aidl = true
    }
    packaging {
        jniLibs {
            keepDebugSymbols += ['**/libandroidx.graphics.path.so']
        }
    }
}

// Disable the failing check tasks
tasks.configureEach { task ->
    if (task.name == 'checkDebugClasspath' || task.name == 'checkDebugAndroidTestClasspath') {
        task.enabled = false
    }
}

