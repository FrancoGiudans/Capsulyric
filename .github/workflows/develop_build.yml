name: Canary Build (Debug & Prerelease)

on:
  push:
    branches: [ "develop" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build All Variants
        run: ./gradlew assembleDebug assemblePrerelease

      - name: Sign Release APK
        id: sign_release
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/prerelease
          buildToolsVersion: 34.0.0
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Capsulyric-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          archive: false

      - name: Upload Signed Release Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Capsulyric-Prerelease-Signed
          path: app/build/outputs/apk/prerelease/app-prerelease-signed.apk
          archive: false
