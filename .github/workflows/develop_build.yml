name: Canary Build (Debug & Prerelease)

on:
  push:
    branches: [ "develop" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build All Variants
        run: ./gradlew assembleDebug assemblePrerelease

      - name: Sign Prerelease APKs
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEY" | base64 --decode > release.keystore
          
          # Sign Standard Prerelease
          STD_APK=$(find app/build/outputs/apk/prerelease -name "*.apk" ! -name "*-signed.apk" | head -n 1)
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEY_STORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out app/build/outputs/apk/prerelease/app-prerelease-signed.apk \
            "$STD_APK"

          rm release.keystore

      - name: Upload Standard Debug Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Capsulyric-Standard-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          archive: false

      - name: Upload Standard Signed Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Capsulyric-Standard-Prerelease-Signed
          path: app/build/outputs/apk/prerelease/app-prerelease-signed.apk
          archive: false

      - name: Rolling Canary Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Canary.Version
          name: Canary Build (Rolling) _C${{ github.run_number }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/prerelease/app-prerelease-signed.apk
          prerelease: true
          generate_release_notes: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
