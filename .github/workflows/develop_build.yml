name: Experiment Build (Canary Tag)

on:
  push:
    branches:
      - develop
      - release/Citlali
    tags: [ "v*" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'screenshots/**'
      - 'LICENSE'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          skip_after_successful_duplicate: 'true'
          concurrent_skipping: 'same_content'

  build-all:
    needs: pre_job
    if: |
      needs.pre_job.outputs.should_skip != 'true' &&
      !contains(github.event.head_commit.message, '[skip canary]') &&
      !contains(github.event.head_commit.message, '[skip experiment]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Build Metadata
        id: build_meta
        shell: bash
        run: |
          CODENAME=$(sed -n 's/^[[:space:]]*appCodename[[:space:]]*=[[:space:]]*//p' gradle.properties | tail -n 1 | tr -d '\r')
          if [ -z "$CODENAME" ]; then
            CODENAME="Unassigned"
          fi
          VERSION_PREFIX="Version.$(TZ=Asia/Shanghai date +'%y').$(TZ=Asia/Shanghai date +'%-m')"
          echo "codename=$CODENAME" >> $GITHUB_OUTPUT
          echo "version_prefix=$VERSION_PREFIX" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Experiment Package
        run: ./gradlew assemblePrerelease -PversionPrefix="${{ steps.build_meta.outputs.version_prefix }}" -PversionChannel=Experiment -PappCodename="${{ steps.build_meta.outputs.codename }}"

      - name: Sign Experiment APKs
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEY" | base64 --decode > release.keystore
          
          # Sign experiment package generated from the prerelease build type.
          STD_APK=$(find app/build/outputs/apk/prerelease -name "*.apk" ! -name "*-signed.apk" | head -n 1)
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEY_STORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out app/build/outputs/apk/prerelease/app-prerelease-signed.apk \
            "$STD_APK"

          rm release.keystore

      - name: Generate MD5 Checksum
        run: |
          (cd app/build/outputs/apk/prerelease/ && md5sum app-prerelease-signed.apk > app-prerelease-signed.apk.md5)


      - name: Upload Standard Signed Artifact
        uses: actions/upload-artifact@v6
        with:
          name: Capsulyric-Experiment-Signed
          path: |
            app/build/outputs/apk/prerelease/app-prerelease-signed.apk
            app/build/outputs/apk/prerelease/app-prerelease-signed.apk.md5

      - name: Generate Experiment Metadata
        if: |
          github.event_name == 'push' &&
          !contains(github.event.head_commit.message, '[assemble only]')
        id: meta
        run: |
          COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          VERSION_PREFIX="${{ steps.build_meta.outputs.version_prefix }}"
          CODENAME="${{ steps.build_meta.outputs.codename }}"
          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$BRANCH_NAME" | sed 's#[^A-Za-z0-9._-]#-#g')
          DISPLAY_VERSION="${VERSION_PREFIX}.Canary_C${COUNT}"
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          
          # Find the most recent previous shared Canary tag for changelog comparison
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^(Canary\.Version|Canary\.[A-Za-z0-9._-]+|Version\.[0-9]{2}\.[0-9]+\.Canary)_C[0-9]+$' | head -n 1)
          PREV_SHA=""
          if [ -n "$PREV_TAG" ]; then
            PREV_SHA=$(git rev-list -n 1 "$PREV_TAG" 2>/dev/null || echo "")
          fi
          
          # Base name of the release
          REL_NAME="Experiment Build ${DISPLAY_VERSION}"
          TAG_NAME="Canary.Version_C${COUNT}"
          echo "rel_name=$REL_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Prepare Changelog Body
          echo "> [!WARNING]" > canary_body.md
          echo "> **实验性版本 (Experimental Build)**" >> canary_body.md
          echo ">" >> canary_body.md
          echo "> 这是从 \`${BRANCH_NAME}\` 分支自动生成的 Experiment 滚动构建（沿用 Canary Tag 兼容旧版本）。可能包含不稳定的代码或破坏性变更。请谨慎使用。" >> canary_body.md
          echo ">" >> canary_body.md
          echo "> This is a rolling Experiment release generated automatically from the \`${BRANCH_NAME}\` branch, while keeping the Canary tag for backward compatibility. It may contain unstable code or breaking changes. Use with caution." >> canary_body.md
          echo "" >> canary_body.md
          echo "## Experiment Build (Rolling Canary Tag)" >> canary_body.md
          echo "- **Codename:** \`${CODENAME}\`" >> canary_body.md
          echo "- **Version:** \`${DISPLAY_VERSION}\`" >> canary_body.md
          echo "- **Tag:** \`${TAG_NAME}\`" >> canary_body.md
          echo "- **Build Number:** \`_C${COUNT}\`" >> canary_body.md
          echo "- **Latest Commit:** \`${SHORT_SHA}\`" >> canary_body.md
          echo "- **Branch:** \`${BRANCH_NAME}\`" >> canary_body.md
          echo "" >> canary_body.md
          echo "### Changes since last Experiment / Canary release" >> canary_body.md
          
          if [ -z "$PREV_SHA" ]; then
            echo "First Experiment build recorded." >> canary_body.md
          elif [ "$PREV_SHA" == "$(git rev-parse HEAD)" ]; then
            echo "No new commits (Re-run or manual trigger)." >> canary_body.md
          else
            # Get logs skipping merge commits, with author info and full body
            git log ${PREV_SHA}..HEAD --no-merges --format="- **%h**: %s (%an)%n%w(0,2,2)%b%n" >> canary_body.md
            
            # Add a compare link
            echo -e "\n\n**Full Comparison:** [${PREV_SHA:0:7}...${SHORT_SHA}](https://github.com/${{ github.repository }}/compare/${PREV_SHA}...${SHORT_SHA})" >> canary_body.md
          fi
          echo "" >> canary_body.md
          echo "> [!NOTE]" >> canary_body.md
          echo "> 本次发布的 MD5 校验文件已同步上传，请在下载后进行校验。" >> canary_body.md
          echo "> The MD5 checksum file for this release has been uploaded. Please verify after downloading." >> canary_body.md
          echo "" >> canary_body.md
          echo "---" >> canary_body.md

      - name: Delete old Canary releases and tags
        if: |
          github.event_name == 'push' &&
          !contains(github.event.head_commit.message, '[assemble only]')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CANARY_TAGS=$(git tag | grep -E '^(Canary\.Version|Canary\.[A-Za-z0-9._-]+|Version\.[0-9]{2}\.[0-9]+\.Canary)_C[0-9]+$' || true)
          if [ -n "$CANARY_TAGS" ]; then
            echo "Found existing Canary tags: $CANARY_TAGS"
            for tag in $CANARY_TAGS; do
              echo "Deleting release and tag: $tag"
              gh release delete "$tag" --yes || echo "Release $tag not found."
              git push origin --delete "$tag" || echo "Remote tag $tag not found."
            done
          else
            echo "No existing Canary tags to delete."
          fi

      - name: Rolling Experiment Release
        if: |
          github.event_name == 'push' &&
          !contains(github.event.head_commit.message, '[assemble only]')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.rel_name }}
          body_path: canary_body.md
          target_commitish: ${{ steps.meta.outputs.branch_name }}
          files: |
            app/build/outputs/apk/prerelease/app-prerelease-signed.apk
            app/build/outputs/apk/prerelease/app-prerelease-signed.apk.md5
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
