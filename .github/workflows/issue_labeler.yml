name: Issue Labeler
on:
  issues:
    types: [opened]

jobs:
  label_issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-label based on form selection
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            let label = "";
            if (body.includes("bug")) label = "bug";
            else if (body.includes("enhancement")) label = "enhancement";
            else if (body.includes("question")) label = "question";
            else if (body.includes("document")) label = "documentation";

            if (label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: [label]
              });
            }
