[versions]
agp = "9.1.0"
annotation = "1.9.1"
kotlin = "2.3.10"
coreKtx = "1.18.0"
media = "1.7.1"
material = "1.13.0"
superLyricApi = "2.6"
lyricGetterApi = "6.0.0"
activityCompose = "1.13.0"
composeBom = "2026.03.00"
markwon = "4.6.2"
coil = "2.7.0"
miuix = "0.8.6"
shizuku = "13.1.5"
focusApi = "1.4"
palette = "1.0.0"
okhttp = "5.3.2"
coroutines = "1.10.2"
navigationEvent = "1.0.1"
lifecycle = "2.8.7"

[libraries]
annotation = { module = "androidx.annotation:annotation", version.ref = "annotation" }
core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
media = { group = "androidx.media", name = "media", version.ref = "media" }
material = { group = "com.google.android.material", name = "material", version.ref = "material" }
super-lyric-api = { group = "com.github.HChenX", name = "SuperLyricApi", version.ref = "superLyricApi" }
lyric-getter-api = { group = "com.github.xiaowine", name = "Lyric-Getter-Api", version.ref = "lyricGetterApi" }
kotlin-bom = { group = "org.jetbrains.kotlin", name = "kotlin-bom", version.ref = "kotlin" }
kotlin-stdlib = { group = "org.jetbrains.kotlin", name = "kotlin-stdlib", version.ref = "kotlin" }

# Compose
activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }
compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }
ui = { group = "androidx.compose.ui", name = "ui" }
ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }
ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }
ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }
